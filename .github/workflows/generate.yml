name: Generate Shorts

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'  # Runs daily at 6 AM UTC

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2 \
            libcairo2-dev \
            libpango-1.0-0 \
            libpango1.0-dev \
            libglib2.0-dev \
            ffmpeg \
            pkg-config \
            fonts-dejavu

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run Shorts Generator
        run: python batch_run.py

      - name: DEBUG - List all output folders
        if: always()
        run: |
          echo "=== SCRIPTS ==="
          ls -la scripts/scripts_output/ 2>/dev/null || echo "NO SCRIPTS FOLDER"
          echo "=== ANIMATIONS ==="
          ls -la animation/animations_output/ 2>/dev/null || echo "NO ANIMATIONS FOLDER"
          echo "=== CAPTIONS ==="
          ls -la captions/captions_output/ 2>/dev/null || echo "NO CAPTIONS FOLDER"
          echo "=== THUMBNAILS ==="
          ls -la thumbnails/thumbnails_output/ 2>/dev/null || echo "NO THUMBNAILS FOLDER"
          echo "=== OUTPUT ==="
          ls -la output/ 2>/dev/null || echo "NO OUTPUT FOLDER"

      - name: Upload generated videos to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: youtube-shorts
          path: output/
          retention-days: 5
